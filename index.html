<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate Chatbot Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      padding: 2rem;
    }

    .hero h1 {
      font-size: 2rem;
      color: #1a2e4a;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: #4a6080;
    }

    /* Chat Bubble */
    #chat-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 60px;
      height: 60px;
      background: #1a3a6b;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(26,58,107,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 1000;
    }

    #chat-bubble:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 22px rgba(26,58,107,0.5);
    }

    #chat-bubble svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    /* Chat Window */
    #chat-window {
      position: fixed;
      bottom: 100px;
      right: 28px;
      width: 320px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #chat-window.open { display: flex; }

    .chat-header {
      background: #1a3a6b;
      color: #fff;
      padding: 14px 18px;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .dot {
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
    }

    .chat-body {
      padding: 18px;
      flex: 1;
    }

    .chat-message {
      background: #f0f4f8;
      border-radius: 12px 12px 12px 2px;
      padding: 12px 14px;
      color: #1a2e4a;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .chat-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-options button {
      background: #fff;
      border: 2px solid #1a3a6b;
      color: #1a3a6b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
    }

    .chat-options button:hover {
      background: #1a3a6b;
      color: #fff;
    }

    .chat-reply {
      background: #1a3a6b;
      color: #fff;
      border-radius: 12px 12px 2px 12px;
      padding: 12px 14px;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: 6px;
      display: none;
    }

    .chat-footer {
      padding: 10px 18px;
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Real Estate Chatbot Demo</h1>
    <p>Click the chat bubble below</p>
  </div>

  <!-- Chat Bubble -->
  <div id="chat-bubble" onclick="toggleChat()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 10H6v-2h12v2zm0-4H6V6h12v2z"/>
    </svg>
  </div>

  <!-- Chat Window -->
  <div id="chat-window">
    <div class="chat-header">
      <div class="dot"></div>
      Real Estate Assistant
    </div>
    <div class="chat-body">
      <div class="chat-message">
        Hi there! I'm here to help you with your real estate needs.<br><br>
        <strong>Are you looking to buy, sell, or rent?</strong>
      </div>
      <div class="chat-options" id="options">
        <button onclick="selectOption('buy')">🏠 Buy a property</button>
        <button onclick="selectOption('sell')">💰 Sell my property</button>
        <button onclick="selectOption('rent')">🔑 Rent a property</button>
      </div>
      <div class="chat-reply" id="reply"></div>
    </div>
    <div class="chat-footer">Powered by MR Web Solutions</div>
  </div>

  <script>
    function toggleChat() {
      const win = document.getElementById('chat-window');
      win.classList.toggle('open');
    }

    function selectOption(choice) {
      document.getElementById('options').style.display = 'none';
      const reply = document.getElementById('reply');
      const messages = {
        buy: "Great! Looking to buy? I can help you find your dream home. A licensed agent will follow up with you shortly to discuss budget, location, and must-haves.",
        sell: "Ready to sell? Smart move! Our agents will provide a free home valuation and guide you through listing, staging, and closing — stress-free.",
        rent: "Looking to rent? We have listings across the city. Tell us your preferred area and budget, and we'll match you with the best options available."
      };
      reply.textContent = messages[choice];
      reply.style.display = 'block';
    }
  </script>

</body>
</html>
